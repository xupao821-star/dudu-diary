---
layout: default
---
<div class="post-wrapper">
  <a href="{{ site.baseurl }}/" class="back">← 返回</a>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%Y年%m月%d日" }}</div>
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</div>
